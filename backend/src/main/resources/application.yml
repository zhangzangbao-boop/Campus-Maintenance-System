server:
  port: 8080  # 更改端口避免冲突

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/repairdb?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=true&enabledTLSProtocols=TLSv1.3}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 连接池配置（适配MySQL 9.x的超时机制）
      connection-timeout: 30000  # 30秒超时
      max-lifetime: 1800000      # 30分钟连接生命周期（MySQL 9.x默认超时更严格）
      minimum-idle: 5
      maximum-pool-size: 10
      validation-timeout: 5000   # 验证连接有效性超时
  jpa:
    hibernate:
      ddl-auto: update  # 自动更新表结构（首次启动后可改为validate）
    properties:
      hibernate:
        # 显式指定MySQL 9.x方言（避免自动检测失败）
        dialect: org.hibernate.dialect.MySQLDialect
        # 禁用MySQL 9.x默认的缓存机制冲突
        cache:
          use_second_level_cache: false
          use_query_cache: false
        # 事务隔离级别：READ_COMMITTED（读已提交，防止脏读）
        connection:
          isolation: 2  # 2 = READ_COMMITTED
    show-sql: true  # 开发环境显示SQL，生产环境关闭
  transaction:
    default-timeout: 30  # 默认事务超时时间（秒）

# 数据备份配置
backup:
  directory: ./backups  # 备份文件存储目录
  retention-days: 30    # 备份文件保留天数，超过此天数的备份将被自动删除
  auto-enabled: false
  cron: "0 30 2 * * ?" # 默认每天凌晨 2:30，开启 auto-enabled 后生效

jwt:
  secret: ${JWT_SECRET:mySecretKeyForCampusMaintenanceSystem123456}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}

ai:
  enabled: false
  provider: deepseek
  base-url: https://api.deepseek.com
  api-key: ${DEEPSEEK_API_KEY:}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  timeout-seconds: 20
  thinking:
    enabled: false
